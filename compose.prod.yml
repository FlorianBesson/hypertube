services:
    api-express:
        build:
            context: ./backend
            target: dev
        ports: 
            - "3000:3000"
        volumes:
            - ./backend/:/app/
        env_file:
            - .env
        networks:
            - prisma-network
        depends_on:
            postgres_db:
                condition: service_healthy
        restart: unless-stopped
        
    postgres_db:
        image: postgres:17
        hostname: postgres_db
        container_name: postgres_db
        restart: always
        environment:
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        ports:
            - "5432:5432"
        networks:
            - prisma-network
        healthcheck: 
                test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"] 
                interval: 5s
                timeout: 2s
                retries: 20
        volumes: 
            - postgres_data:/var/lib/postgresql/data
        command: postgres -c listen_addresses='*'
    
networks: 
    prisma-network: 
volumes: 
    postgres_data: 
