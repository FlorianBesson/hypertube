services:
    vite:
        build:
            context: ./frontend
            dockerfile: Dockerfile
            target: dev
        ports:
            - '5173:5173'
        env_file:
            - .env
        volumes:
            - ./frontend:/app
            - /app/node_modules
            - ./.env:/config/.env:ro
        networks:
            - prisma-network
        restart: unless-stopped
        
    api-express:
        build:
            context: ./backend
            target: dev
        ports: 
            - "3000:3000"
        volumes:
            - ./backend/:/app/
            - /app/node_modules
        env_file:
            - .env
        environment:
            - NODE_ENV=dev
        networks:
            - prisma-network
        depends_on:
            postgres_db:
                condition: service_healthy
        restart: unless-stopped
        
    postgres_db:
        image: postgres:17
        hostname: postgres_db
        container_name: postgres_db
        restart: always
        environment:
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        ports:
            - "5432:5432"
        networks:
            - prisma-network
        healthcheck: 
                test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"] 
                interval: 5s
                timeout: 2s
                retries: 20
        volumes: 
            - postgres_data:/var/lib/postgresql/data
        command: postgres -c listen_addresses='*'
                
    prisma-studio:
        image: node:24
        working_dir: /app
        volumes:
            - ./backend/:/app
        command: npx prisma studio --port 5555 --browser none
        ports: 
            - "5555:5555"
        env_file:
            - .env
        networks:
            - prisma-network
        depends_on:
            postgres_db:
                condition: service_healthy
            api-express:
                condition: service_started
    
networks: 
    prisma-network: 
volumes: 
    postgres_data: 
