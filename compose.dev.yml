services:
    vite:
        build:
            context: ./frontend
            dockerfile: Dockerfile
            target: dev
        ports:
            - '5173:5173'
        volumes:
            - ./frontend:/app
            - /app/node_modules
            - ./.env:/config/.env:ro
        restart: unless-stopped
        
    api-express:
        build:
            context: ./backend
            target: dev
        ports: 
            - "3000:3000"
        volumes:
            - ./backend/:/app/
        env_file:
            - ./backend/.env
        networks:
            - prisma-network
        restart: unless-stopped
        
    postgres:
        image: postgres:17
        restart: always
        environment:
            - POSTGRES_DB=postgres
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=prisma
        ports:
            - "5432:5432"
        networks:
            - prisma-network
        healthcheck: 
                test: ["CMD-SHELL", "pg_isready -U prisma -d postgres"] 
                interval: 5s
                timeout: 2s
                retries: 20
        volumes: 
            - postgres_data:/var/lib/postgresql/data
        command: postgres -c listen_addresses='*'
        logging: 
            options: 
                max-size: "10m"
                max-file: "3"
networks: 
    prisma-network: 
volumes: 
    postgres_data: 
