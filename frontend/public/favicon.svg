<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Smooth gradient between the two red colors -->
    <linearGradient id="redMagnetGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>

    <!-- Faded/subtle gradient for the white caps (fading completely to 0 opacity) -->
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <!-- Clip path to keep white caps inside the rounded magnet shape -->
    <clipPath id="magnetClip">
      <path d="M 35 50 L 35 20 A 5 5 0 0 0 30 15 L 20 15 A 5 5 0 0 0 15 20 L 15 50 A 35 35 0 0 0 85 50 L 85 20 A 5 5 0 0 0 80 15 L 70 15 A 5 5 0 0 0 65 20 L 65 50 A 15 15 0 0 1 35 50 Z" />
    </clipPath>
  </defs>

  <!-- We rotate it -25 degrees for a dynamic, active look -->
  <g transform="rotate(-25 50 50)">
    <!-- Full Magnet shape with rounded corners -->
    <path d="M 35 50 L 35 20 A 5 5 0 0 0 30 15 L 20 15 A 5 5 0 0 0 15 20 L 15 50 A 35 35 0 0 0 85 50 L 85 20 A 5 5 0 0 0 80 15 L 70 15 A 5 5 0 0 0 65 20 L 65 50 A 15 15 0 0 1 35 50 Z" fill="url(#redMagnetGrad)" />
    
    <!-- Taller white caps (height 12) with a smooth faded gradient -->
    <g clip-path="url(#magnetClip)">
      <rect x="15" y="15" width="20" height="12" fill="url(#capGrad)" />
      <rect x="65" y="15" width="20" height="12" fill="url(#capGrad)" />
    </g>
  </g>
</svg>